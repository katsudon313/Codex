<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello from AI Web App!</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b1120;
            --panel: rgba(15, 23, 42, 0.9);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --user-bubble: #2563eb;
            --ai-bubble: #1f2937;
            --shadow: rgba(15, 23, 42, 0.55);
            --toggle-bg: rgba(15, 23, 42, 0.6);
            --toggle-text: #f8fafc;
        }
        [data-theme="light"] {
            color-scheme: light;
            --bg: #f8fafc;
            --panel: rgba(255, 255, 255, 0.85);
            --text: #0f172a;
            --muted: #475569;
            --border: rgba(148, 163, 184, 0.35);
            --user-bubble: #3b82f6;
            --ai-bubble: #e2e8f0;
            --shadow: rgba(30, 64, 175, 0.25);
            --toggle-bg: rgba(255, 255, 255, 0.6);
            --toggle-text: #0f172a;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.55) 0%, var(--bg) 45%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 16px;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .chat-shell {
            width: min(760px, 95vw);
            height: min(720px, 92vh);
            background-color: var(--panel);
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 28px 48px var(--shadow);
            backdrop-filter: blur(12px);
            position: relative;
            transition: background-color 0.3s ease;
        }
        header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .theme-toggle {
            position: absolute;
            top: 18px;
            right: 24px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background-color: var(--toggle-bg);
            color: var(--toggle-text);
            padding: 8px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, background-color 0.3s ease, color 0.3s ease;
        }
        .theme-toggle:hover {
            transform: translateY(-1px);
        }
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
            max-height: 600px;
        }
        .chat-window::-webkit-scrollbar {
            width: 8px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(96, 165, 250, 0.4);
            border-radius: 10px;
        }
        .message-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .message-row.user {
            justify-content: flex-end;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .message-row.ai .avatar {
            background: rgba(148, 163, 184, 0.2);
        }
        .bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            background: var(--ai-bubble);
            color: var(--text);
            box-shadow: 0 12px 22px rgba(15, 23, 42, 0.35);
            white-space: pre-wrap;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .message-row.user .bubble {
            background: var(--user-bubble);
            color: #f8fafc;
            border-bottom-right-radius: 8px;
        }
        .message-row.ai .bubble {
            border-bottom-left-radius: 8px;
        }
        form {
            border-top: 1px solid var(--border);
            padding: 18px 26px 22px;
            background: rgba(11, 17, 32, 0.9);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background 0.3s ease;
        }
        [data-theme="light"] form {
            background: rgba(255, 255, 255, 0.85);
        }
        .composer {
            display: flex;
            gap: 14px;
        }
        textarea {
            flex: 1;
            resize: none;
            min-height: 80px;
            max-height: 160px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid transparent;
            background-color: rgba(30, 41, 59, 0.85);
            color: var(--text);
            font-size: 1rem;
            line-height: 1.5;
            transition: border-color 0.2s ease, background-color 0.3s ease;
        }
        [data-theme="light"] textarea {
            background-color: rgba(226, 232, 240, 0.75);
        }
        textarea:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.6);
        }
        button[type="submit"] {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #f1f5f9;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 14px 26px rgba(37, 99, 235, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            flex-shrink: 0;
        }
        button[type="submit"]:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 18px 32px rgba(37, 99, 235, 0.45);
        }
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: wait;
            box-shadow: none;
        }
        .status {
            min-height: 1.2em;
            font-size: 0.95rem;
            color: var(--muted);
            text-align: right;
        }
        .status.error {
            color: #f87171;
        }
        @media (max-width: 640px) {
            header {
                padding: 20px 20px;
            }
            .theme-toggle {
                right: 18px;
            }
            .chat-window {
                padding: 20px;
            }
            form {
                padding: 16px 20px 20px;
            }
        }
    </style>
</head>
<body>
    <main class="chat-shell">
        <header>
            <h1>Hello from AI Web App!</h1>
            <button type="button" class="theme-toggle" id="theme-toggle" aria-label="テーマ切り替え">
                <span class="sun">🌞</span>
                <span class="moon">🌙</span>
            </button>
        </header>
        <section class="chat-window" id="chat-window" aria-live="polite"></section>
        <form id="chat-form">
            <div class="composer">
                <textarea id="message" name="message" placeholder="メッセージを入力..." required></textarea>
                <button type="submit" id="send">送信</button>
            </div>
            <div class="status" id="status" role="status"></div>
        </form>
    </main>
    <script>
        const rootElement = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const form = document.getElementById('chat-form');
        const messageInput = document.getElementById('message');
        const chatWindow = document.getElementById('chat-window');
        const sendButton = document.getElementById('send');
        const statusText = document.getElementById('status');

        function applyTheme(theme) {
            rootElement.setAttribute('data-theme', theme);
            if (theme === 'light') {
                document.body.style.background = 'radial-gradient(circle at top, rgba(59, 130, 246, 0.25) 0%, #f8fafc 50%)';
            } else {
                document.body.style.background = 'radial-gradient(circle at top, rgba(59, 130, 246, 0.55) 0%, #0b1120 45%)';
            }
        }

        function toggleTheme() {
            const current = rootElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            try {
                localStorage.setItem('chat-theme', next);
            } catch (err) {
                /* ignore storage errors */
            }
        }

        function initTheme() {
            let theme = 'dark';
            try {
                const stored = localStorage.getItem('chat-theme');
                if (stored === 'light' || stored === 'dark') {
                    theme = stored;
                }
            } catch (err) {
                /* localStorage may not be available */
            }
            applyTheme(theme);
        }

        function appendMessage(text, role) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '🧑' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            if (role === 'user') {
                row.appendChild(bubble);
                row.appendChild(avatar);
            } else {
                row.appendChild(avatar);
                row.appendChild(bubble);
            }

            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setStatus(message, isError = false) {
            statusText.textContent = message;
            statusText.classList.toggle('error', isError);
        }

        themeToggle.addEventListener('click', toggleTheme);
        initTheme();

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const userMessage = messageInput.value.trim();
            if (!userMessage) {
                return;
            }

            appendMessage(userMessage, 'user');
            messageInput.value = '';
            messageInput.focus({ preventScroll: false });
            setStatus('送信中...');
            sendButton.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMessage })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    const errorText = errorData.error || '予期しないエラーが発生しました。';
                    throw new Error(errorText);
                }

                const data = await response.json();
                const reply = (data.reply || '応答が取得できませんでした。').trim();
                appendMessage(reply, 'ai');
                setStatus('');
            } catch (err) {
                appendMessage('申し訳ありません。応答を取得できませんでした。', 'ai');
                setStatus(err.message || '通信エラーが発生しました。', true);
            } finally {
                sendButton.disabled = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });
    </script>
</body>
</html>
