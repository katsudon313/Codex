<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | AI Assistant</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --user-bubble: #2563eb;
            --ai-bubble: #1f2937;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d4ed8, #111827);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .chat-shell {
            width: min(900px, 96vw);
            height: min(720px, 92vh);
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
        }
        header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .title {
            display: flex;
            flex-direction: column;
        }
        .title h1 {
            margin: 0;
            font-size: 1.8rem;
        }
        .title span {
            font-size: 0.95rem;
            color: var(--muted);
        }
        .logout {
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 999px;
            padding: 10px 18px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-weight: 600;
        }
        .chat-window {
            flex: 1;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            scroll-behavior: smooth;
            max-height: 600px;
        }
        .chat-window::-webkit-scrollbar {
            width: 8px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            border-radius: 10px;
            background: rgba(96, 165, 250, 0.35);
        }
        .message-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .message-row.user {
            justify-content: flex-end;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .message-row.ai .avatar {
            background: rgba(148, 163, 184, 0.2);
        }
        .bubble {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            background: var(--ai-bubble);
            color: var(--text);
            white-space: pre-wrap;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.4);
        }
        .message-row.user .bubble {
            background: var(--user-bubble);
            color: #e0f2fe;
            border-bottom-right-radius: 8px;
        }
        .message-row.ai .bubble {
            border-bottom-left-radius: 8px;
        }
        form {
            padding: 18px 26px 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(11, 17, 32, 0.9);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .composer {
            display: flex;
            gap: 14px;
        }
        textarea {
            flex: 1;
            resize: none;
            min-height: 88px;
            max-height: 180px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid transparent;
            background: rgba(30, 41, 59, 0.85);
            color: inherit;
            font-size: 1rem;
        }
        textarea:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.5);
        }
        button[type="submit"] {
            padding: 14px 22px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #f8fafc;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button[type="submit"]:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 20px 38px rgba(37, 99, 235, 0.45);
        }
        button[type="submit"]:disabled {
            opacity: 0.65;
            cursor: wait;
            box-shadow: none;
        }
        .status {
            min-height: 1.2em;
            font-size: 0.95rem;
            color: var(--muted);
            text-align: right;
        }
        .status.error {
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <main class="chat-shell">
        <header>
            <div class="title">
                <h1>AI Chat</h1>
                <span>Signed in as {{ user_email }}</span>
            </div>
            <form method="post" action="{{ url_for('logout') }}">
                <button type="submit" class="logout">Log out</button>
            </form>
        </header>
        <section class="chat-window" id="chat-window" aria-live="polite"></section>
        <form id="chat-form">
            <div class="composer">
                <textarea id="message" name="message" placeholder="Ask the AI..." required></textarea>
                <button type="submit" id="send">Send</button>
            </div>
            <div class="status" id="status" role="status"></div>
        </form>
    </main>
    <script>
        const form = document.getElementById('chat-form');
        const messageInput = document.getElementById('message');
        const chatWindow = document.getElementById('chat-window');
        const sendButton = document.getElementById('send');
        const statusText = document.getElementById('status');

        function appendMessage(text, role) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '🧑' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            if (role === 'user') {
                row.appendChild(bubble);
                row.appendChild(avatar);
            } else {
                row.appendChild(avatar);
                row.appendChild(bubble);
            }

            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setStatus(message, isError = false) {
            statusText.textContent = message;
            statusText.classList.toggle('error', isError);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const userMessage = messageInput.value.trim();
            if (!userMessage) {
                return;
            }

            appendMessage(userMessage, 'user');
            messageInput.value = '';
            messageInput.focus({ preventScroll: false });
            setStatus('送信中...');
            sendButton.disabled = true;

            try {
                const response = await fetch('{{ url_for("chat") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMessage })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    const errorText = errorData.error || 'An unexpected error occurred.';
                    throw new Error(errorText);
                }

                const data = await response.json();
                const reply = (data.reply || '応答が取得できませんでした。').trim();
                appendMessage(reply, 'ai');
                setStatus('');
            } catch (err) {
                appendMessage('Sorry, I could not process that request.', 'ai');
                setStatus(err.message || 'Network error.', true);
            } finally {
                sendButton.disabled = false;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });
    </script>
</body>
</html>
